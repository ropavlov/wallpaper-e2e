name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Needed to publish the HTML report to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # All projects (chrome/firefox/webkit) run headless in CI.
        run: npx playwright install --with-deps

      - name: Run end-to-end tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      # Publish the HTML report even when tests fail.
      - name: Upload report as Pages artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  # Deploy the report to GitHub Pages -> https://<owner>.github.io/<repo>/
  deploy-report:
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
